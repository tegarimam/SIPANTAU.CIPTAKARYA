<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPANTAU CIPTA KARYA - Local Storage Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .hidden { display: none; }
        .tab-active { border-bottom: 4px solid #facc15; color: #facc15; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-full shadow-sm">🏗️</div>
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none uppercase">SIPANTAU CIPTA KARYA</h1>
                    <p class="text-[10px] tracking-[0.2em] font-bold text-yellow-400 uppercase">DPRKPCK Prov. Jawa Timur</p>
                </div>
            </div>
            
            <div class="relative">
                <button id="menuBtn" class="p-2 hover:bg-blue-800 rounded-lg transition">
                    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/></svg>
                </button>
                <div id="dropdownMenu" class="hidden absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-xl border z-50 overflow-hidden text-gray-800">
                    <button onclick="switchMajorMenu('sni')" class="w-full text-left px-4 py-4 text-sm font-bold hover:bg-blue-50 flex items-center gap-3 border-b">📂 PANTAU SNI</button>
                    <button onclick="switchMajorMenu('lapangan')" class="w-full text-left px-4 py-4 text-sm font-bold hover:bg-blue-50 flex items-center gap-3 border-b">🏗️ PANTAU LAPANGAN</button>
                    <button onclick="switchMajorMenu('monitoring')" class="w-full text-left px-4 py-4 text-sm font-bold hover:bg-yellow-50 flex items-center gap-3 text-blue-700">📊 MONITORING REALTIME</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div id="section-sni" class="animate-fadeIn">
            <div class="flex space-x-6 border-b-2 mb-8 text-xs font-bold text-gray-400 overflow-x-auto px-2 uppercase">
                <button onclick="switchSubTab('gudang')" id="tab-gudang" class="pb-3 tab-active">📂 Gudang SNI</button>
                <button onclick="switchSubTab('cek')" id="tab-cek" class="pb-3">🔍 Cek SNI</button>
                <button onclick="switchSubTab('laporansni')" id="tab-laporansni" class="pb-3">📤 Laporan Final</button>
            </div>

            <div id="sub-gudang" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl border-l-8 border-blue-600 shadow-sm col-span-full">
                    <h3 class="font-bold text-sm mb-4 text-blue-900 uppercase">Daftar Dokumen SNI Terintegrasi</h3>
                    <div id="listSNI" class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                        </div>
                </div>
            </div>
            </div>

        <div id="section-monitoring" class="hidden animate-fadeIn">
            <h2 class="text-2xl font-black text-blue-900 mb-6 uppercase italic">Monitoring Realtime Data</h2>
            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 text-[10px] uppercase font-bold text-gray-500">
                        <tr>
                            <th class="p-4">Tanggal</th>
                            <th class="p-4">Kategori</th>
                            <th class="p-4">Nama Proyek</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="monitoringTableBody" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const daftarSNI = [
            "SNI 2847:2019 - Persyaratan Beton Struktural",
            "SNI 1726:2019 - Ketahanan Gempa Gedung",
            "SNI 1727:2020 - Beban Desain Minimum",
            "SNI 1729:2020 - Spesifikasi Bangunan Baja",
            "SNI 2052:2017 - Baja Tulangan Beton",
            "SNI 8460:2017 - Perancangan Geoteknik",
            "SNI 1735:2015 - Akses Pemadam Kebakaran",
            "SNI 03-1734-1989 - Perencanaan Beton Bertulang",
            "SNI 7971:2013 - Struktur Kayu",
            "SNI 2847:2013 - Persyaratan Beton (Legacy)"
        ];

        // Render Daftar SNI
        const listContainer = document.getElementById('listSNI');
        daftarSNI.forEach(sni => {
            listContainer.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border hover:border-blue-400 transition">
                    <span class="font-medium text-gray-700">${sni}</span>
                    <button class="text-[10px] bg-blue-100 text-blue-800 px-3 py-1 rounded-lg font-black uppercase">Lihat PDF</button>
                </div>
            `;
        });

        // LOCAL STORAGE LOGIC
        window.simpanKeLocalStorage = function(tipe) {
            let nama, deskripsi = "-";
            if(tipe === 'SNI') nama = document.getElementById('idProyekSNI').value;
            if(tipe === 'Lapangan') {
                nama = document.getElementById('idProyekLap').value;
                deskripsi = document.getElementById('deskripsiProgres').value;
            }

            if(!nama) return alert("Harap isi Nama Proyek!");

            const dataBaru = {
                id: Date.now(),
                tanggal: new Date().toLocaleString('id-ID'),
                kategori: tipe,
                proyek: nama,
                detail: deskripsi,
                status: "Tersimpan Lokal"
            };

            let storage = JSON.parse(localStorage.getItem('sipantau_data')) || [];
            storage.push(dataBaru);
            localStorage.setItem('sipantau_data', JSON.stringify(storage));

            alert(`Berhasil! Data ${tipe} "${nama}" telah diarsip ke Monitoring.`);
            updateMonitoringTable();
        }

        function updateMonitoringTable() {
            const body = document.getElementById('monitoringTableBody');
            const data = JSON.parse(localStorage.getItem('sipantau_data')) || [];
            
            body.innerHTML = data.length ? "" : "<tr><td colspan='5' class='p-8 text-center text-gray-400 italic'>Belum ada data masuk.</td></tr>";
            
            data.reverse().forEach(item => {
                body.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 text-xs">${item.tanggal}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${item.kategori === 'SNI' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">${item.kategori}</span></td>
                        <td class="p-4 font-bold">${item.proyek}</td>
                        <td class="p-4 text-green-600 font-bold text-xs">✓ Active</td>
                        <td class="p-4"><button onclick="alert('Detail: ${item.detail}')" class="text-blue-600 font-bold hover:underline">Buka File</button></td>
                    </tr>
                `;
            });
        }

        // NAVIGATION LOGIC
        function switchMajorMenu(menu) {
            const sections = ['sni', 'lapangan', 'monitoring'];
            sections.forEach(s => document.getElementById('section-' + s).classList.add('hidden'));
            document.getElementById('section-' + menu).classList.remove('hidden');
            document.getElementById('dropdownMenu').classList.add('hidden');
            if(menu === 'monitoring') updateMonitoringTable();
        }

        function switchSubTab(sub) {
            const allSubs = ['gudang', 'cek', 'laporansni', 'lapMingguan', 'presentase'];
            allSubs.forEach(s => {
                const el = document.getElementById('sub-' + s);
                if(el) el.classList.add('hidden');
                const tab = document.getElementById('tab-' + s);
                if(tab) tab.classList.remove('tab-active');
            });
            document.getElementById('sub-' + sub).classList.remove('hidden');
            document.getElementById('tab-' + sub).classList.add('tab-active');
        }

        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('hidden'); };
        window.onclick = () => dropdownMenu.classList.add('hidden');

        // Panggil saat start
        updateMonitoringTable();
    </script>
</body>
</html>
